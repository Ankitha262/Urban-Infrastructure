<!DOCTYPE html>
<html>

<head>
<title>Urban Infrastructure Survey</title>

<style>
body{
font-family: Arial;
background:#eef2f5;
padding:30px;
}

.container{
background:white;
width:750px;
margin:auto;
padding:30px;
border-radius:10px;
box-shadow:0 0 12px grey;
}

h1{text-align:center;}

.section{display:none;}
.active{display:block;}

button{
margin-top:20px;
padding:10px 20px;
background:#2c7be5;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

input, select{
margin-top:5px;
margin-bottom:10px;
width:100%;
padding:5px;
}

</style>

<script>

let current = 0;

function showSection(index){
let sections = document.getElementsByClassName("section");
for(let i=0;i<sections.length;i++){
sections[i].classList.remove("active");
}
sections[index].classList.add("active");
}

function nextSection(){
current++;
showSection(current);
}

function submitSurvey(){

let data = {

age: document.getElementById("age").value,
income: document.getElementById("income").value,
residence: document.querySelector('input[name="residence"]:checked')?.value,
household: document.getElementById("household").value,
vehicles: document.getElementById("vehicles").value,

waterSource: document.getElementById("waterSource").value,
waterReliability: document.querySelector('input[name="waterReliability"]:checked')?.value,
drainage: document.querySelector('input[name="drainage"]:checked')?.value,
waterlogging: document.getElementById("waterlogging").value,
road: document.querySelector('input[name="road"]:checked')?.value,
waste: document.getElementById("waste").value,
satisfaction: document.querySelector('input[name="satisfaction"]:checked')?.value,
issue: document.getElementById("issue").value,
suggestion: document.getElementById("suggestion").value

};

fetch("https://script.google.com/macros/s/AKfycbx8BuQ01LHfp8fV8hn0kcr75V1D8ut2fWSvj5DrBYuEXWRKre4rMUshUkAwcQxoXqNtMg/exec", {
method:"POST",
body: JSON.stringify(data)
});

alert("Response submitted successfully!");

}

window.onload = function(){
showSection(0);
}

</script>

</head>

<body>

<div class="container">

<h1>Urban Infrastructure Survey</h1>

<!-- SECTION 1: DEMOGRAPHICS -->

<div class="section">

<h3>Basic Information</h3>

<label>Age</label>
<select id="age">
<option value="">Select</option>
<option>18-25</option>
<option>26-40</option>
<option>41-60</option>
<option>60+</option>
</select>

<label>Income</label>
<select id="income">
<option value="">Select</option>
<option><25000</option>
<option>25000-50000</option>
<option>50000-100000</option>
<option>>100000</option>
</select>

<label>Residence</label>
<input type="radio" name="residence" value="Owned"> Owned
<input type="radio" name="residence" value="Rented"> Rented

<label>Household size</label>
<select id="household">
<option value="">Select</option>
<option>1-2</option>
<option>3-5</option>
<option>6+</option>
</select>

<label>Vehicles</label>
<select id="vehicles">
<option value="">Select</option>
<option>0</option>
<option>1</option>
<option>2</option>
<option>3+</option>
</select>

<button onclick="nextSection()">Next</button>

</div>

<!-- SECTION 2 -->

<div class="section">

<h3>Water Supply</h3>

<label>Water Source</label>
<select id="waterSource">
<option value="">Select</option>
<option>Piped</option>
<option>Borewell</option>
<option>Tanker</option>
</select>

<label>Water Reliability</label>
<input type="radio" name="waterReliability" value="Poor"> Poor
<input type="radio" name="waterReliability" value="Average"> Average
<input type="radio" name="waterReliability" value="Good"> Good

<button onclick="nextSection()">Next</button>

</div>

<!-- SECTION 3 -->

<div class="section">

<h3>Drainage</h3>

<label>Drainage Condition</label>
<input type="radio" name="drainage" value="Poor"> Poor
<input type="radio" name="drainage" value="Average"> Average
<input type="radio" name="drainage" value="Good"> Good

<label>Waterlogging</label>
<select id="waterlogging">
<option value="">Select</option>
<option>Never</option>
<option>Occasional</option>
<option>Frequent</option>
</select>

<button onclick="nextSection()">Next</button>

</div>

<!-- SECTION 4 -->

<div class="section">

<h3>Road & Waste</h3>

<label>Road Condition</label>
<input type="radio" name="road" value="Poor"> Poor
<input type="radio" name="road" value="Average"> Average
<input type="radio" name="road" value="Good"> Good

<label>Waste Collection</label>
<select id="waste">
<option value="">Select</option>
<option>Daily</option>
<option>Irregular</option>
<option>None</option>
</select>

<button onclick="nextSection()">Next</button>

</div>

<!-- SECTION 5 -->

<div class="section">

<h3>Overall Feedback</h3>

<label>Satisfaction</label>
<input type="radio" name="satisfaction" value="1">1
<input type="radio" name="satisfaction" value="2">2
<input type="radio" name="satisfaction" value="3">3
<input type="radio" name="satisfaction" value="4">4
<input type="radio" name="satisfaction" value="5">5

<label>Main Issue</label>
<select id="issue">
<option value="">Select</option>
<option>Water</option>
<option>Drainage</option>
<option>Road</option>
<option>Waste</option>
</select>

<label>Suggestion</label>
<input type="text" id="suggestion">

<button onclick="submitSurvey()">Submit</button>

</div>

</div>

</body>

</html>
